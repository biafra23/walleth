name: CI

on:
  push:
  workflow_dispatch:

# Opt JS-based actions into Node.js 24 (Node 20 is being deprecated on runners).
# Covers actions that don't yet have a Node 24 major (e.g. upload-artifact).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Gradle 7.2 / AGP 7.0.3 / Kotlin 1.5.31 require JDK 11.
      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '11'
          cache: gradle

      # -PsingleFlavor limits the build to the forFDroid flavors to keep CI fast.
      - name: Assemble debug + unit tests
        run: ./gradlew -PsingleFlavor assembleDebug testNoGethForFDroidOnlineDebugUnitTest --stacktrace

      # Tag the default-flavor APK with the short commit hash so each download is unique.
      - name: Stage APK
        id: stage
        run: |
          short_sha="${GITHUB_SHA:0:6}"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          mkdir -p artifacts
          apk=$(find app/build/outputs/apk/noGethForFDroidOnline/debug -name '*-debug.apk' | head -n1)
          cp "$apk" "artifacts/$(basename "$apk" .apk)-$short_sha.apk"
          ls -1 artifacts

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: walleth-debug-${{ steps.stage.outputs.short_sha }}
          path: artifacts/*.apk
          if-no-files-found: error
